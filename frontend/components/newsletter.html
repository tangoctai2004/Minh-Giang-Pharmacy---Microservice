<section class="newsletter-section" style="background: #cbcbcb; padding: 15px 0;">
    <div class="container newsletter-inner" style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; gap: 40px;">
        <div class="newsletter-text" style="font-size: 15px; color: #111827; font-weight: 700; flex: 1;">
            Đăng ký nhận thông tin khuyến mãi hấp dẫn, sản phẩm bán chạy và cẩm nang bảo vệ sức khỏe
        </div>
        <form class="newsletter-form" style="display: flex; gap: 0; flex: 1; max-width: 400px;">
            <input type="email" placeholder="E-mail" style="flex: 1; padding: 8px 16px; border: 1px solid #ffffff; border-radius: 20px 0 0 20px; outline: none; font-size: 14px; background: #ffffff;">
            <button type="submit" style="padding: 8px 25px; background: #005824; color: #ffffff; border: none; border-radius: 0 20px 20px 0; font-weight: 700; cursor: pointer; font-size: 14px; transition: background 0.2s;">
                Đăng ký
            </button>
        </form>
    </div>
</section>
